name: CD

# The CD pipeline runs only after the CI pipeline has completed
# successfully on the main branch, enforcing a quality gate before any
# artifact is published.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-publish:
    name: Build and publish container image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image references must be lowercase; the repository owner can
      # contain uppercase characters, so normalise it here.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Smoke-test the published image
        run: |
          IMAGE=${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          docker run -d --name news2 -p 8000:8000 "$IMAGE"
          for i in $(seq 1 10); do
            if curl -fs http://localhost:8000/health; then
              echo "Health check passed"
              docker rm -f news2
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed"
          docker logs news2
          docker rm -f news2
          exit 1
